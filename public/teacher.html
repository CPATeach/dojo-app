<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multiplication Dojo - Teacher View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #F4EFE3; --ink-dim: #B9B4A8; --dojo-bg: #1B1F3B; --dojo-bg-2: #141731;
    --gold: #E8B94A; --gold-deep: #C9942A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Nunito', sans-serif; color: var(--ink);
    background: linear-gradient(180deg, var(--dojo-bg) 0%, var(--dojo-bg-2) 100%);
    min-height: 100vh; padding: 28px 18px 60px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Bungee', sans-serif; font-weight: 400; font-size: 28px; margin: 6px 0; }
  .subhead { color: var(--ink-dim); font-weight: 600; margin-bottom: 20px; }
  .panel { background: rgba(0,0,0,0.18); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; }
  input {
    font-family: 'JetBrains Mono', monospace; font-size: 16px; padding: 10px 14px; border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.2); color: var(--ink); width: 100%; margin-bottom: 10px;
  }
  button {
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; border: none; border-radius: 10px;
    padding: 12px 18px; background: linear-gradient(180deg, var(--gold), var(--gold-deep)); color: #1B1F3B; cursor: pointer;
  }
  table { width: 100%; border-collapse: collapse; margin-top: 18px; font-size: 14px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  th { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .error { color: #D9634C; font-weight: 700; font-size: 13px; margin-top: 8px; min-height: 16px; }
  .belt-count { font-family: 'JetBrains Mono', monospace; color: var(--gold); font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Teacher View</h1>
  <div class="subhead">Enter the class code to see every student's mastery progress.</div>
  <div class="panel">
    <input id="code" placeholder="Class code" autocomplete="off" />
    <button id="load-btn">Load class roster</button>
    <div class="error" id="error"></div>
    <table id="roster-table" style="display:none;">
      <thead><tr><th>Student</th><th>Belts mastered</th><th>Sessions completed</th></tr></thead>
      <tbody id="roster-body"></tbody>
    </table>
  </div>
</div>
<script>
  const codeInput = document.getElementById('code');
  const errorBox = document.getElementById('error');
  const table = document.getElementById('roster-table');
  const body = document.getElementById('roster-body');

  async function loadRoster() {
    errorBox.textContent = '';
    table.style.display = 'none';
    const code = codeInput.value.trim();
    if (!code) { errorBox.textContent = 'Enter a class code.'; return; }
    try {
      const res = await fetch('/api/roster?classCode=' + encodeURIComponent(code));
      const data = await res.json();
      if (!res.ok) { errorBox.textContent = data.error || 'Could not load roster.'; return; }
      body.innerHTML = '';
      if (data.roster.length === 0) {
        body.innerHTML = '<tr><td colspan="3">No students have logged in yet.</td></tr>';
      } else {
        data.roster.forEach(s => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${s.name}</td><td class="belt-count">${s.masteredCount} / 8</td><td>${s.totalSessions}</td>`;
          body.appendChild(tr);
        });
      }
      table.style.display = 'table';
    } catch (e) {
      errorBox.textContent = 'Something went wrong loading the roster.';
    }
  }

  document.getElementById('load-btn').addEventListener('click', loadRoster);
  codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadRoster(); });
</script>
</body>
</html>
